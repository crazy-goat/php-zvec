name: Build PHP Extension

on:
  pull_request:
    branches: [main]

env:
  ZVEC_VERSION: v0.2.0
  ZVEC_BUILD_RELEASE: zvec-build-v0.2.0

jobs:
  build-ubuntu:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        php-version: ['8.4']

    name: Ubuntu 24.04 - PHP ${{ matrix.php-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake g++ \
            libssl-dev libz-dev \
            autoconf automake libtool \
            curl \
            binutils

      - name: Download prebuilt zvec
        run: |
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${ZVEC_BUILD_RELEASE}/zvec-${ZVEC_VERSION}-ubuntu24-x86_64.tar.gz"
          echo "Downloading: $URL"
          curl -fL "$URL" -o /tmp/zvec.tar.gz

          rm -rf zvec
          tar -xzf /tmp/zvec.tar.gz

          test -f zvec/build/lib/libzvec_db.a
          test -d zvec/src/include
          test -d zvec/thirdparty/sparsehash/sparsehash-2.0.4/src

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: phpize

      - name: Build PHP extension
        working-directory: php-ext
        run: |
          phpize
          ./configure --enable-zvec
          make -j$(nproc)

      - name: Re-link with whole-archive (libtool workaround)
        working-directory: php-ext
        run: |
          ZVEC_LIB="../zvec/build/lib"
          ZVEC_EXT_LIB="../zvec/build/external/usr/local/lib"
          CORE_LIBS=$(ls $ZVEC_LIB/*.a | grep -v libzvec_db.a)
          g++ -shared -fPIC -DPIC \
            .libs/*.o \
            -Wl,--whole-archive \
              $ZVEC_LIB/libzvec_db.a \
              $ZVEC_EXT_LIB/*.a \
            -Wl,--no-whole-archive \
              $CORE_LIBS \
            -lssl -lcrypto -lstdc++ -lz -lpthread -ldl \
            -Wl,-soname,zvec.so \
            -o modules/zvec.so

      - name: Strip extension
        working-directory: php-ext
        run: strip --strip-unneeded modules/zvec.so

      - name: Verify extension loads
        id: verify
        working-directory: php-ext
        continue-on-error: true
        run: |
          php -n -d enable_dl=1 -d extension=modules/zvec.so -r 'if (!extension_loaded("zvec")) { echo "FAIL: zvec not loaded\n"; exit(1); } echo "zvec loaded: yes\n";'

      - name: Debug load failure
        if: steps.verify.outcome == 'failure'
        run: |
          echo "=== CPU flags ==="
          grep -m1 'model name' /proc/cpuinfo
          grep -m1 'flags' /proc/cpuinfo | tr ' ' '\n' | grep -E 'avx|sse|bmi' | sort
          echo "=== ldd ==="
          ldd php-ext/modules/zvec.so || true
          echo "=== undefined symbols ==="
          php -n -d enable_dl=1 -d extension=php-ext/modules/zvec.so -r 'echo "test";' 2>&1 || true
          echo "=== objdump: AVX-512 instructions ==="
          objdump -d php-ext/modules/zvec.so | grep -c 'zmm' || echo "no zmm (AVX-512) found"
          echo "=== objdump: AVX2 instructions ==="
          objdump -d php-ext/modules/zvec.so | grep -c 'ymm' || echo "no ymm (AVX2) found"

      - name: Run tests
        if: steps.verify.outcome == 'success'
        run: |
          php -n -d enable_dl=1 -d extension=php-ext/modules/zvec.so run-tests.php -q --show-diff tests/

      - name: Fail job if extension failed to load
        if: steps.verify.outcome == 'failure'
        run: exit 1

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: zvec-php${{ matrix.php-version }}-ubuntu24-${{ runner.arch }}
          path: php-ext/modules/zvec.so

  build-macos:
    if: false
    runs-on: macos-latest
    strategy:
      matrix:
        php-version: ['8.4']

    name: macOS - PHP ${{ matrix.php-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
