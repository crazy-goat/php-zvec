name: Build PHP Extension

on:
  push:
    branches: [main, feature/github-actions-ci]
  pull_request:
    branches: [main]

env:
  ZVEC_VERSION: v0.2.0

jobs:
  build-zvec:
    strategy:
      matrix:
        include:
          - os: macos-latest
            os-key: macos
          - os: ubuntu-24.04
            os-key: ubuntu24

    runs-on: ${{ matrix.os }}
    name: Build zvec - ${{ matrix.os-key }} (${{ env.ZVEC_VERSION }})

    steps:
      - name: Cache zvec build
        uses: actions/cache@v4
        id: cache-zvec
        with:
          path: zvec
          key: zvec-${{ env.ZVEC_VERSION }}-${{ matrix.os-key }}-${{ runner.arch }}

      - name: Install build tools (Ubuntu)
        if: steps.cache-zvec.outputs.cache-hit != 'true' && matrix.os-key == 'ubuntu24'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake g++ libssl-dev libz-dev

      - name: Clone zvec
        if: steps.cache-zvec.outputs.cache-hit != 'true'
        run: |
          git clone --recurse-submodules --branch ${{ env.ZVEC_VERSION }} --depth 1 \
            https://github.com/alibaba/zvec.git zvec

      - name: Build zvec C++ library
        if: steps.cache-zvec.outputs.cache-hit != 'true'
        working-directory: zvec
        run: |
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

  build-macos:
    needs: build-zvec
    runs-on: macos-latest
    strategy:
      matrix:
        php-version: ['8.3', '8.4']

    name: macOS - PHP ${{ matrix.php-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore zvec build
        uses: actions/cache/restore@v4
        with:
          path: zvec
          key: zvec-${{ env.ZVEC_VERSION }}-macos-${{ runner.arch }}
          fail-on-cache-miss: true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: phpize

      - name: Build PHP extension
        working-directory: php-ext
        run: |
          phpize
          ./configure --enable-zvec
          make -j$(sysctl -n hw.ncpu)

      - name: Strip extension
        working-directory: php-ext
        run: strip -x modules/zvec.so

      - name: Verify extension loads
        working-directory: php-ext
        run: |
          php -n -d extension=modules/zvec.so -r 'echo "zvec loaded: " . (extension_loaded("zvec") ? "yes" : "no") . "\n";'

      - name: Run tests
        run: |
          php -n -d extension=php-ext/modules/zvec.so run-tests.php -q --show-diff tests/

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: zvec-php${{ matrix.php-version }}-macos-${{ runner.arch }}
          path: php-ext/modules/zvec.so

  build-ubuntu:
    needs: build-zvec
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        php-version: ['8.3', '8.4']

    name: Ubuntu 24.04 - PHP ${{ matrix.php-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake g++ \
            libssl-dev libz-dev \
            autoconf automake libtool

      - name: Restore zvec build
        uses: actions/cache/restore@v4
        with:
          path: zvec
          key: zvec-${{ env.ZVEC_VERSION }}-ubuntu24-${{ runner.arch }}
          fail-on-cache-miss: true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: phpize

      - name: Build PHP extension
        working-directory: php-ext
        run: |
          phpize
          ./configure --enable-zvec
          make -j$(nproc)

      - name: Strip extension
        working-directory: php-ext
        run: strip --strip-unneeded modules/zvec.so

      - name: Verify extension loads
        working-directory: php-ext
        run: |
          php -n -d extension=modules/zvec.so -r 'echo "zvec loaded: " . (extension_loaded("zvec") ? "yes" : "no") . "\n";'

      - name: Run tests
        run: |
          php -n -d extension=php-ext/modules/zvec.so run-tests.php -q --show-diff tests/

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: zvec-php${{ matrix.php-version }}-ubuntu24-${{ runner.arch }}
          path: php-ext/modules/zvec.so
