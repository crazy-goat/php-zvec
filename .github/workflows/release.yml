name: Release PHP Extension

on:
  push:
    tags:
      - 'v*'

env:
  ZVEC_VERSION: v0.4.0
  ZVEC_BUILD_RELEASE: zvec-build-v0.4.0

jobs:
  create-release:
    runs-on: ubuntu-24.04
    name: Create Release

    permissions:
      contents: write

    steps:
      - name: Verify tag is on main
        run: |
          git clone --bare "https://github.com/${GITHUB_REPOSITORY}.git" /tmp/repo.git
          if ! git -C /tmp/repo.git branch --contains "${{ github.sha }}" | grep -qw main; then
            echo "ERROR: Tag ${{ github.ref_name }} is not on main branch"
            exit 1
          fi

      - name: Create release if not exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            || echo "Release already exists"

  setup-zvec:
    needs: create-release
    runs-on: ubuntu-24.04
    name: Build zvec C++ library

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake g++ \
            libssl-dev libz-dev \
            curl rsync binutils

      - name: Setup zvec ${{ env.ZVEC_VERSION }}
        run: |
          PREBUILT_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${ZVEC_BUILD_RELEASE}/zvec-${ZVEC_VERSION}-ubuntu24-x86_64.tar.gz"
          ./build_zvec_lib.sh "$ZVEC_VERSION" "$PREBUILT_URL"
          test -f zvec/build/lib/libzvec_db.a
          test -d zvec/src/include
          test -d zvec/thirdparty/sparsehash/sparsehash-2.0.4/src

      - name: Package zvec build for downstream jobs
        run: |
          PKG=$(mktemp -d)
          mkdir -p "$PKG/zvec/src" \
                   "$PKG/zvec/thirdparty/sparsehash/sparsehash-2.0.4" \
                   "$PKG/zvec/build/external/usr/local"
          rsync -a zvec/src/include                                "$PKG/zvec/src/"
          rsync -a zvec/thirdparty/sparsehash/sparsehash-2.0.4/src "$PKG/zvec/thirdparty/sparsehash/sparsehash-2.0.4/"
          rsync -a zvec/build/lib                                   "$PKG/zvec/build/"
          rsync -a zvec/build/external/usr/local/lib                "$PKG/zvec/build/external/usr/local/"
          tar -czf zvec-pkg.tar.gz -C "$PKG" zvec

      - name: Upload artifact for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: zvec-build
          path: zvec-pkg.tar.gz

      - name: Upload prebuilt zvec for future CI builds
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BUILD_RELEASE="zvec-build-${ZVEC_VERSION}"
          TARBALL="zvec-${ZVEC_VERSION}-ubuntu24-x86_64.tar.gz"
          echo "Packaging $TARBALL for release $BUILD_RELEASE"
          PKG=$(mktemp -d)
          mkdir -p "$PKG/zvec/src" \
                   "$PKG/zvec/thirdparty/sparsehash/sparsehash-2.0.4" \
                   "$PKG/zvec/build/external/usr/local"
          rsync -a zvec/src/include                                "$PKG/zvec/src/"
          rsync -a zvec/thirdparty/sparsehash/sparsehash-2.0.4/src "$PKG/zvec/thirdparty/sparsehash/sparsehash-2.0.4/"
          rsync -a zvec/build/lib                                   "$PKG/zvec/build/"
          rsync -a zvec/build/external/usr/local/lib                "$PKG/zvec/build/external/usr/local/"
          tar -czf "$TARBALL" -C "$PKG" zvec
          rm -rf "$PKG"
          gh release create "$BUILD_RELEASE" \
            --repo "${{ github.repository }}" \
            --title "zvec ${ZVEC_VERSION} build artifacts" \
            --notes "Pre-built zvec ${ZVEC_VERSION} library for ubuntu-24.04. Used by CI to avoid rebuilding zvec from source on every PR." \
            || echo "Release ${BUILD_RELEASE} already exists"
          gh release upload "$BUILD_RELEASE" "$TARBALL" --clobber

  release-ffi:
    needs: setup-zvec
    runs-on: ubuntu-24.04
    name: Build & Release FFI Library (Ubuntu)

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download zvec artifact
        uses: actions/download-artifact@v4
        with:
          name: zvec-build

      - name: Extract zvec
        run: |
          tar -xzf zvec-pkg.tar.gz
          rm zvec-pkg.tar.gz
          test -f zvec/build/lib/libzvec_db.a
          test -d zvec/src/include
          test -d zvec/thirdparty/sparsehash/sparsehash-2.0.4/src

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake g++ \
            libssl-dev libz-dev \
            curl binutils

      - name: Build FFI shared library
        working-directory: ffi
        run: |
          mkdir -p build
          cd build
          cmake ..
          make -j$(nproc)
          ls -la libzvec_ffi.so

      - name: Strip library
        working-directory: ffi/build
        run: |
          ls -la libzvec_ffi.so
          strip -s libzvec_ffi.so
          ls -la libzvec_ffi.so

      - name: Package FFI library
        run: |
          ASSET_NAME="libzvec_ffi-ubuntu24-x86_64.tar.gz"
          tar -czf "$ASSET_NAME" -C ffi/build libzvec_ffi.so
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Upload FFI release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "$ASSET_NAME" --clobber

  release-ffi-alpine:
    needs: create-release
    runs-on: ubuntu-24.04
    container: alpine:3.20
    name: Build & Release FFI (Alpine x86_64)

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apk add --no-cache \
            build-base cmake g++ bash \
            openssl-dev zlib-dev \
            curl git coreutils

      - name: Build zvec C++ library from source
        run: |
          ./build_zvec_lib.sh "$ZVEC_VERSION"
          test -f zvec/build/lib/libzvec_db.a

      - name: Build FFI shared library
        working-directory: ffi
        run: |
          mkdir -p build
          cd build
          cmake ..
          make -j$(nproc)
          ls -la libzvec_ffi.so

      - name: Strip library
        run: strip ffi/build/libzvec_ffi.so

      - name: Package FFI library
        run: |
          ASSET_NAME="libzvec_ffi-alpine-x86_64.tar.gz"
          tar -czf "$ASSET_NAME" -C ffi/build libzvec_ffi.so
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Upload FFI release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "$ASSET_NAME" --clobber

  release-ffi-macos:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: macos-13
            arch: x86_64
            asset_suffix: darwin-x86_64
          - os: macos-14
            arch: arm64
            asset_suffix: darwin-aarch64
    runs-on: ${{ matrix.os }}
    name: Build & Release FFI (macOS ${{ matrix.arch }})

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          brew install openssl zlib

      - name: Build zvec C++ library from source
        run: |
          ./build_zvec_lib.sh "$ZVEC_VERSION"
          test -f zvec/build/lib/libzvec_db.a

      - name: Build FFI shared library
        working-directory: ffi
        run: |
          mkdir -p build
          cd build
          cmake ..
          make -j$(sysctl -n hw.ncpu)
          ls -la libzvec_ffi.dylib

      - name: Strip library
        run: strip -S ffi/build/libzvec_ffi.dylib

      - name: Package FFI library
        run: |
          ASSET_NAME="libzvec_ffi-${{ matrix.asset_suffix }}.tar.gz"
          tar -czf "$ASSET_NAME" -C ffi/build libzvec_ffi.dylib
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Upload FFI release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "$ASSET_NAME" --clobber

  release-ext:
    needs: setup-zvec
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        php-version: ['8.4']

    name: Build & Release PHP Extension - ${{ matrix.php-version }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download zvec artifact
        uses: actions/download-artifact@v4
        with:
          name: zvec-build

      - name: Extract zvec
        run: |
          tar -xzf zvec-pkg.tar.gz
          rm zvec-pkg.tar.gz
          test -f zvec/build/lib/libzvec_db.a
          test -d zvec/src/include
          test -d zvec/thirdparty/sparsehash/sparsehash-2.0.4/src

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake g++ \
            libssl-dev libz-dev \
            autoconf automake libtool \
            curl binutils

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: phpize

      - name: Build PHP extension
        working-directory: php-ext
        run: |
          phpize
          ./configure --enable-zvec
          make -j$(nproc)

      - name: Re-link with whole-archive (libtool workaround)
        working-directory: php-ext
        run: |
          ZVEC_LIB="../zvec/build/lib"
          ZVEC_EXT_LIB="../zvec/build/external/usr/local/lib"
          g++ -shared -fPIC -DPIC \
            .libs/*.o \
            -Wl,--whole-archive \
              $ZVEC_LIB/libzvec_db.a \
              $ZVEC_LIB/libzvec_ailego.a \
              $ZVEC_LIB/libzvec_core.a \
              $ZVEC_LIB/libzvec_turbo.a \
              $ZVEC_EXT_LIB/*.a \
            -Wl,--no-whole-archive \
            -lssl -lcrypto -lstdc++ -lz -lpthread -ldl \
            -Wl,-soname,zvec.so \
            -o modules/zvec.so

      - name: Strip extension
        working-directory: php-ext
        run: strip --strip-unneeded modules/zvec.so

      - name: Verify extension loads
        working-directory: php-ext
        run: |
          php -n -d enable_dl=1 -d extension=modules/zvec.so -r 'if (!extension_loaded("zvec")) { echo "FAIL: zvec not loaded\n"; exit(1); } echo "zvec loaded: yes\n";'

      - name: Run tests
        env:
          TEST_PHP_ARGS: "-n -d extension=${{ github.workspace }}/php-ext/modules/zvec.so"
        run: |
          php run-tests.php -q --show-diff tests/

      - name: Package extension
        run: |
          ASSET_NAME="zvec-php${{ matrix.php-version }}-ubuntu24-x86_64.tar.gz"
          tar -czf "$ASSET_NAME" -C php-ext/modules zvec.so
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "$ASSET_NAME" --clobber
